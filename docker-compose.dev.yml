# Standalone dev service with its own PostgreSQL
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_native_oss
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/s3.json <<'CONF'
        {"identities":[{"name":"admin","credentials":[{"accessKey":"admin","secretKey":"admin"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
        CONF
        exec weed server -s3 -s3.config=/tmp/s3.json -dir=/data
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweed_data_dev:/data

  whisper-server:
    build:
      context: ./docker/whisper-server
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-small}
    ports:
      - "8178:8178"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8178/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  dev:
    build:
      context: .
      dockerfile: apps/dev/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_native_oss
      BETTER_AUTH_SECRET: dev-secret-change-in-production
      BETTER_AUTH_URL: http://localhost:3000
      PORT: "3000"
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: agent-files
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin
      WHISPER_SERVER_URL: http://whisper-server:8178
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_dev:
  seaweed_data_dev:
