name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `pnpm dev`
        2. Navigate to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or screenshots if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v20.x.x

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14, Ubuntu 22.04, Windows 11, etc.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots about the problem.
