services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maskin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    command: "server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data"
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweed_data:/data
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro

  dev:
    build:
      context: .
      dockerfile: apps/dev/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/maskin
      PORT: "3000"
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: agent-files
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  seaweed_data:
