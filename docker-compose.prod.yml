services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_native_oss}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/s3.json <<'CONF'
        {"identities":[{"name":"admin","credentials":[{"accessKey":"admin","secretKey":"admin"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
        CONF
        exec weed server -s3 -s3.config=/tmp/s3.json -dir=/data
    volumes:
      - seaweed_data:/data

  whisper-server:
    build:
      context: ./docker/whisper-server
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-small}
    ports:
      - "8178:8178"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8178/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  agent-base:
    build:
      context: ./docker/agent-base
    image: agent-base:latest
    entrypoint: ["echo", "agent-base image built"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: apps/dev/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    command: ["sh", "-c", "node packages/db/dist/migrate.js && node apps/dev/dist/index.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_native_oss}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      PORT: "3000"
      NODE_ENV: production
      STATIC_DIR: /app/apps/web/dist
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: ${S3_BUCKET:-agent-files}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-admin}
      S3_REGION: ${S3_REGION:-us-east-1}
      # GitHub integration (optional)
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-}
      WHISPER_SERVER_URL: http://whisper-server:8178
    depends_on:
      postgres:
        condition: service_healthy
      agent-base:
        condition: service_completed_successfully

volumes:
  pgdata:
  seaweed_data:
